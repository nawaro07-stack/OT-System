<!DOCTYPE html>
<html>
<head>
  <title>OT System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .user {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

      input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box; /* 🔥 สำคัญ */
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .summary {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .alert-ok {
      color: green;
      text-align: center;
    }

    .alert-danger {
      color: red;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 10px;
      background: #fafafa;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>OT System</h2>

  <div class="card">
    <div id="username" class="user"></div>
  </div>

  <div class="card">
    <form target="hiddenFrame"
          action="https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec"
          method="POST"
          onsubmit="setTimeout(afterSave,500);">

      <input type="hidden" name="action" value="saveOT">
      <input type="hidden" name="empcode" id="empcodeField">
      <input type="hidden" name="name" id="nameField">
      <input type="hidden" name="phase" id="phaseField">

      <label>Date</label>
      <input type="date" name="date" required>

      <label>OT Hour</label>
      <input type="number" name="ot_hour" step="0.5" required>

      <button type="submit">💾 Save OT</button>
    </form>
  </div>

  <div class="card">
    <div class="summary">
      Weekly OT: <span id="total">-</span> hr
    </div>
    <div id="alert"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <iframe id="historyFrame"></iframe>
  </div>

</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>
const API = "https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec";

// USER
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("กรุณา login ใหม่");
  window.location.href = "login.html";
}

if(user.role === "admin"){
  window.location.href = "admin.html";
}

const empcode = user.empcode;
const name = user.name;
const phase = user.phase;

// set user info
document.getElementById("empcodeField").value = empcode;
document.getElementById("nameField").value = name;
document.getElementById("phaseField").value = phase;

document.getElementById("username").innerText =
  name + " (" + empcode + ") - " + phase;

window.addEventListener("message", function(e){

  console.log("MSG:", e.data); // debug

  // 🔥 รับเฉพาะ object ที่มี total
  if(e.data && typeof e.data === "object" && "total" in e.data){

    const total = e.data.total;

    document.getElementById("total").innerText = total;

    if(total > 36){
      document.getElementById("alert").innerText = "⚠️ OT เกิน 36 ชั่วโมง!";
      document.getElementById("alert").className = "alert-danger";
    }else{
      document.getElementById("alert").innerText = "OK";
      document.getElementById("alert").className = "alert-ok";
    }

  }
});

// LOAD HISTORY
const frame = document.getElementById("historyFrame");

frame.src = API + "?action=getMyData&empcode=" + empcode;

// SAVE
function afterSave(){
  alert("Saved!");
  location.reload();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}


</script>
<button onclick="logout()">Logout</button>
</body>
</html>
