<!DOCTYPE html>
<html>
<head>
  <title>OT System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:500px;
      margin:auto;
    }

    .card{
      background:white;
      padding:20px;
      margin-bottom:15px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:5px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:12px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#125ea8;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td{
      border:1px solid #ddd;
      padding:6px;
      text-align:center;
    }

    .ok{ color:green; }
    .danger{ color:red; }
  </style>
</head>

<body>

<div class="container">

  <h2>OT System</h2>

  <div class="card">
    <h3 id="username"></h3>
  </div>

  <div class="card">

    <form action="https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec"
          method="POST"
          onsubmit="setTimeout(afterSave,500);">

      <input type="hidden" name="action" value="saveOT">
      <input type="hidden" name="empcode" id="empcodeField">
      <input type="hidden" name="name" id="nameField">
      <input type="hidden" name="phase" id="phaseField">

      <label>Date</label>
      <input type="date" name="date" required>

      <label>OT Hour</label>
      <input type="number" name="ot_hour" step="0.5" required>

      <button type="submit">💾 Save OT</button>
    </form>

  </div>

  <div class="card">
    <h3>Weekly OT: <span id="total">0</span> hr</h3>
    <h4 id="alert"></h4>
  </div>

  <div class="card">
    <h3>History</h3>
    <table id="tbl"></table>
  </div>

  <div class="card">
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec";

// ================= USER =================
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("กรุณา login ใหม่");
  window.location.href = "login.html";
}

if(user.role === "admin"){
  window.location.href = "admin.html";
}

const empcode = user.empcode;
const name = user.name;
const phase = user.phase;

// set hidden
document.getElementById("empcodeField").value = empcode;
document.getElementById("nameField").value = name;
document.getElementById("phaseField").value = phase;

// show name
document.getElementById("username").innerText =
  name + " (" + empcode + ") - " + phase;


// ================= LOAD DATA =================
function loadData(){

  fetch(API + "?action=getMyData&empcode=" + empcode)
  .then(res => res.json())
  .then(res => {

    // 🔥 weekly total
    document.getElementById("total").innerText = res.total;

    if(res.total > 36){
      document.getElementById("alert").innerText = "⚠️ OT เกิน 36 ชั่วโมง!";
      document.getElementById("alert").className = "danger";
    } else {
      document.getElementById("alert").innerText = "OK";
      document.getElementById("alert").className = "ok";
    }

    // 🔥 table
    let html = "<tr><th>Date</th><th>OT</th><th>Week</th></tr>";

    res.data.forEach(r=>{
      html += `<tr>
        <td>${r.date}</td>
        <td>${r.ot}</td>
        <td>${r.week}</td>
      </tr>`;
    });

    document.getElementById("tbl").innerHTML = html;

  });
}


// ================= AFTER SAVE =================
function afterSave(){
  alert("Saved!");
  location.reload();
}


// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}


// load on start
loadData();

</script>

</body>
</html>
