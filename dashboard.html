<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#f4f6f9;
      padding:20px;
    }

    h2{
      text-align:center;
    }

    .card{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    select{
      width:100%;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
      border:1px solid #ccc;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
      text-align:center;
    }

    #loading{
      text-align:center;
      font-size:18px;
      color:#555;
      display:none;
    }
  </style>
</head>

<body>

<h2>📊 OT Dashboard</h2>

<div class="card">
  <select id="week" onchange="load()"></select>
</div>

<div id="loading">⏳ Loading...</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <table id="tbl"></table>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec";

let chart;

// ================= LOAD WEEK =================
function loadWeek(){

  fetch(API + "?action=getWeekList")
  .then(res => res.json())
  .then(weeks => {

    let html = '<option value="">All Week</option>';

    weeks.forEach((w,i)=>{
      const selected = (i === weeks.length-1) ? "selected" : "";
      html += `<option value="${w}" ${selected}>Week ${w}</option>`;
    });

    document.getElementById("week").innerHTML = html;

    load(); // โหลดข้อมูลหลังจาก dropdown พร้อม
  });
}


// ================= LOAD DATA =================
function load(){

  document.getElementById("loading").style.display = "block";

  const week = document.getElementById("week").value;

  fetch(API + "?action=getDashboard&week=" + week)
  .then(res => res.json())
  .then(data => {

    // 🔥 sort มาก → น้อย
    data.sort((a,b)=> b.total - a.total);

    drawChart(data);
    renderTable(data);

    document.getElementById("loading").style.display = "none";
  });
}


// ================= CHART =================
function drawChart(data){

  const top = data.slice(0,10); // 🔥 top 10

  const labels = top.map(r=>r.name);
  const values = top.map(r=>r.total);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Top 10 OT Hour",
        data: values,
        borderWidth: 1
      }]
    }
  });
}


// ================= TABLE =================
function renderTable(data){

  let html = "<tr><th>#</th><th>Name</th><th>Phase</th><th>Total OT</th></tr>";

  data.forEach((r,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.phase}</td>
      <td>${r.total}</td>
    </tr>`;
  });

  document.getElementById("tbl").innerHTML = html;
}


// เรียกตอนเปิดหน้า
loadWeek();

</script>

</body>
</html>
