<!DOCTYPE html>
<html>
<head>
  <title>Admin - OT System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial;
      background:#f4f6f9;
      padding:20px;
      margin:0;
    }

    .container{
      max-width:600px;
      margin:auto;
    }

    .card{
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
      text-align:center;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#d32f2f;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#a82323;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Admin Panel</h2>

  <div class="card">
    <input type="text" id="search" placeholder="Search name / empcode" onkeyup="render()">
  </div>

  <div class="card">
    <table id="tbl"></table>
  </div>

  <div class="card">
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- 🔥 SCRIPT ต้องอยู่ล่างสุด -->
<script>

const API = "https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec";

// ================= AUTH =================
const userRaw = localStorage.getItem("user");

if(!userRaw){
  alert("กรุณา login ใหม่");
  window.location.href = "login.html";
}

const user = JSON.parse(userRaw);

console.log("USER:", user);

// 🔥 ตรวจ role
if(user.role !== "admin"){
  alert("Access denied");
  window.location.href = "login.html";
}


// ================= DATA =================
let allData = [];

// ================= LOAD =================
function load(){

  fetch(API + "?action=getAdminData")
  .then(res => res.json())
  .then(data => {

    console.log("DATA:", data);

    allData = data;
    render();

  })
  .catch(err=>{
    console.error(err);
    alert("โหลดข้อมูลไม่ได้");
  });
}


// ================= RENDER =================
function render(){

  const keyword = document.getElementById("search").value.toLowerCase();

  let html = "<tr><th>Empcode</th><th>Name</th><th>Phase</th><th>Total OT</th></tr>";

  allData.forEach(r=>{

    const text = (r.empcode + r.name).toLowerCase();

    if(text.includes(keyword)){

      html += `<tr>
        <td>${r.empcode}</td>
        <td>${r.name}</td>
        <td>${r.phase}</td>
        <td>${r.total}</td>
      </tr>`;
    }
  });

  document.getElementById("tbl").innerHTML = html;
}


// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}


// เรียกตอนเปิดหน้า
load();

</script>

</body>
</html>
