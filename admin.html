<!DOCTYPE html>
<html>
<head>
  <title>Admin - OT System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{ font-family:Arial; background:#f4f6f9; padding:20px; }
    .card{ background:white; padding:15px; margin-bottom:15px; border-radius:10px; }

    input{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      border:1px solid #ddd;
      padding:8px;
      text-align:center;
    }

    button{
      padding:10px;
      width:100%;
      background:#d32f2f;
      color:white;
      border:none;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>Admin Panel</h2>

<div class="card">
  <input type="text" id="search" placeholder="Search name / empcode" onkeyup="render()">
</div>

<div class="card">
  <table id="tbl"></table>
</div>

<div class="card">
  <button onclick="logout()">Logout</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw8lqY0RHOW7B1rdSZJG83ta1yq_NB-cU_uaEYD7_NhQSw-XUU_Ihy3AyWXeSYgkVwhbg/exec";

// ================= AUTH =================
const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "admin"){
  alert("ไม่มีสิทธิ์");
  window.location.href = "login.html";
}

let allData = [];

// ================= LOAD =================
function load(){

  fetch(API + "?action=getAdminData")
  .then(res => res.json())
  .then(data => {

    allData = data;
    render();

  });
}


// ================= RENDER =================
function render(){

  const keyword = document.getElementById("search").value.toLowerCase();

  let html = "<tr><th>Empcode</th><th>Name</th><th>Phase</th><th>Total OT</th></tr>";

  allData.forEach(r=>{

    const text = (r.empcode + r.name).toLowerCase();

    if(text.includes(keyword)){

      html += `<tr>
        <td>${r.empcode}</td>
        <td>${r.name}</td>
        <td>${r.phase}</td>
        <td>${r.total}</td>
      </tr>`;
    }
  });

  document.getElementById("tbl").innerHTML = html;
}


// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

load();

</script>

</body>
</html>
